name: Pipeline Sprint RestAPI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    name: Build e Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Permissão para Gradle
        # Note que mudei para 'Api' (minúsculo) para bater com sua imagem
        run: chmod +x ./Sprint-RestAPI-TP5/gradlew

      - name: Executar Build e Testes
        # Ajustado o nome da pasta aqui também
        working-directory: ./Sprint-RestAPI-TP5
        run: ./gradlew clean test