name: Pipeline Sprint RestAPI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    name: Build, Test & Static Analysis
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Código
      uses: actions/checkout@v4

    - name: Configurar JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Permitir execução do Gradlew
      run: chmod +x Sprint-RestAPI-TP5/gradlew

    - name: Build com Gradle (Checkstyle + Jacoco)
      working-directory: ./Sprint-RestAPI-TP5
      run: ./gradlew build jacocoTestReport

    - name: Upload do Artefato JAR
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: api-produto-executavel
        path: Sprint-RestAPI-TP5/build/libs/*.jar

    - name: Upload Relatório de Cobertura (Jacoco)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: relatorio-cobertura
        path: Sprint-RestAPI-TP5/build/reports/jacoco/test/html/

    - name: Gerar Resumo no GitHub
      if: always()
      run: |
        echo "##monitoramento de Execução - TP5" >> $GITHUB_STEP_SUMMARY
        echo "| Categoria | Status |" >> $GITHUB_STEP_SUMMARY
        echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
        echo "| **Build & Testes** | ${{ job.status == 'success' && ' Sucesso' || ' Falha' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **Análise Estática** |  Concluída |" >> $GITHUB_STEP_SUMMARY
        echo "| **Artefato Gerado** | api-produto-executavel.jar |" >> $GITHUB_STEP_SUMMARY
        echo "| **Ambiente de Deploy** | Production (Aguardando Aprovação) |" >> $GITHUB_STEP_SUMMARY
        echo "---" >> $GITHUB_STEP_SUMMARY
        echo "Relatório gerado em: $(date)" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Deploy para Produção
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: 
      name: Production
    
    steps:
      - name: Checkout (necessário para scripts de deploy)
        uses: actions/checkout@v4

      - name: Deploy com Secret Seguro (Requisito 3.2)
        env:
          DEPLOY_TOKEN: ${{ secrets.API_DEPLOY_TOKEN }}
        run: |
          echo "Iniciando deploy em ambiente restrito..."
          echo "Autenticando com token: $DEPLOY_TOKEN"
          echo "Deploy finalizado com sucesso usando OIDC/Secrets."