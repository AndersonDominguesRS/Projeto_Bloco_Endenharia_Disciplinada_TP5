name: Pipeline Sprint RestAPI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build e Testes Unitários
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # Alinhado com o seu build.gradle
          cache: 'gradle'

      - name: Permissão para Gradle Wrapper
        run: chmod +x ./gradlew

      - name: Build e Testes Unitários
        # Executa a task 'test' que já exclui o ProdutoUITest no seu build.gradle 
        run: ./gradlew clean test

      - name: Gerar Resumo do Job
        if: always()
        run: |
          echo "### Relatório de Build" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Etapa |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ | Compilação e Testes Unitários finalizados |" >> $GITHUB_STEP_SUMMARY