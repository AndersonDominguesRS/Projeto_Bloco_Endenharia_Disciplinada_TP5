name: Pipeline Sprint RestAPI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      ambiente:
        description: "Ambiente de deploy (dev, test, prod)"
        required: true
        default: "dev"

jobs:

  build:
    name: Build e Testes Unitários
    runs-on: ubuntu-latest

    env:
      SPRING_DATASOURCE_URL: ${{ secrets.DB_URL }}
      SPRING_DATASOURCE_USERNAME: ${{ secrets.DB_USERNAME }}
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
      CHROME_HEADLESS: ${{ vars.CHROME_HEADLESS }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Permissão para Gradle Wrapper
        run: chmod +x ./gradlew

      - name: Instalar Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Build do Projeto (sem testes)
        run: ./gradlew clean build -x test

      - name: Testes Unitários
        run: ./gradlew test

      - name: Artefatos - Relatórios de Teste
        uses: actions/upload-artifact@v4
        with:
          name: testes-unitarios
          path: build/reports/tests/test


  sast:
    name: Analise Estatica
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Checkstyle e SpotBugs
        run: ./gradlew check

      - name: Artefatos - Relatórios SAST
        uses: actions/upload-artifact@v4
        with:
          name: analise-estatica
          path: |
            build/reports/checkstyle
            build/reports/spotbugs


  deploy:
    name: Deploy Automatizado
    runs-on: ubuntu-latest
    needs: [build, sast]

    environment: ${{ github.event.inputs.ambiente }}

    permissions:
      id-token: write
      contents: read

    env:
      SPRING_DATASOURCE_URL: ${{ secrets.DB_URL }}
      SPRING_DATASOURCE_USERNAME: ${{ secrets.DB_USERNAME }}
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Autenticacao OIDC com provedor de nuvem
        run: echo "Autenticando via OIDC"

      - name: Baixar artefato do build
        uses: actions/download-artifact@v4
        with:
          name: testes-unitarios

      - name: Deploy no ambiente
        run: |
          echo "Realizando deploy no ambiente: ${{ github.event.inputs.ambiente }}"
          echo "Deploy executado"

      - name: Registrar URL do ambiente
        run: echo "APP_URL=https://meuapp-${{ github.event.inputs.ambiente }}.com" >> $GITHUB_ENV


  post-deploy-tests:
    name: Testes Pos-Deploy
    runs-on: ubuntu-latest
    needs: deploy

    env:
      CHROME_HEADLESS: ${{ vars.CHROME_HEADLESS }}

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Executar Testes Selenium
        env:
          APP_URL: ${{ env.APP_URL }}
        run: |
          echo "Rodando testes contra: $APP_URL"
          ./gradlew seleniumTest -Dapp.url=$APP_URL

      - name: Artefatos - Testes Pos-Deploy
        uses: actions/upload-artifact@v4
        with:
          name: testes-pos-deploy
          path: build/reports/tests/selenium


  summary:
    name: Resumo Final
    runs-on: ubuntu-latest
    needs: post-deploy-tests

    steps:
      - name: Gerar resumo no GitHub Summary
        run: |
          echo "### Relatorio de Automacao" >> $GITHUB_STEP_SUMMARY
          echo "| Etapa | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | Concluido |" >> $GITHUB_STEP_SUMMARY
          echo "| Analise Estatica | Concluida |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | OK |" >> $GITHUB_STEP_SUMMARY
          echo "| Testes Pos-Deploy | OK |" >> $GITHUB_STEP_SUMMARY
