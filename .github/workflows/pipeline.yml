name: Pipeline Sprint RestAPI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    name: Build e Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Permissão para Gradle
        # Note o caminho incluindo a subpasta
        run: chmod +x ./Sprint-RestAPI/gradlew

      - name: Executar Build e Testes
        # Define o working-directory para o Gradle saber onde está o build.gradle
        working-directory: ./Sprint-RestAPI
        run: ./gradlew clean test